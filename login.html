<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Care - Secure Login</title>

<!-- Link to existing global theme CSS -->
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* Authentication Specific Layout extending style.css logic */
.auth-container {
  min-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.auth-card {
  width: 100%;
  max-width: 420px;
  backdrop-filter: blur(20px);
  background: linear-gradient(135deg, var(--card), rgba(255, 255, 255, 0.4));
  border-radius: 24px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 16px 40px rgba(37, 99, 235, 0.15);
  transition: transform 0.3s ease;
}
body.night .auth-card {
  background: linear-gradient(135deg, var(--card), rgba(17, 17, 17, 0.8));
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
}
.auth-card h2 {
  font-size: 28px;
  margin-bottom: 8px;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.auth-card p {
  color: var(--muted);
  margin-bottom: 30px;
  font-size: 14px;
}
.input-group {
  margin-bottom: 20px;
  text-align: left;
}
.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
.input-group input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(148, 163, 184, 0.4);
  background: rgba(255, 255, 255, 0.5);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}
body.night .input-group input {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
}
.input-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
  background: var(--bg);
}
.auth-btn {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 14px;
  margin-top: 10px;
  border: none;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
}
.auth-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(37,99,235,0.3);
}
.toggle-text {
  margin-top: 25px;
  font-size: 14px;
  color: var(--muted);
}
.toggle-text a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
  margin-left: 5px;
}
.toggle-text a:hover {
  color: var(--accent2);
}
</style>
</head>
<body>

<nav>
  <h2>🏥 Soft Care</h2>
  <div>
    <button onclick="setTheme('day')">Day</button>
    <button onclick="setTheme('night')">Night</button>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card" id="loginCard">
    <h2 id="authTitle">Welcome Back</h2>
    <p id="authSubtitle">Login to access your patient portal</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="color: #ef4444; margin-bottom: 15px; font-weight: 600; font-size: 14px; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
      <input type="hidden" name="action" id="actionField" value="login">

      <div class="input-group" id="nameGroup" style="display: none;">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe">
      </div>
      
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn auth-btn" id="submitBtn">Login</button>
      
      <div class="toggle-text">
        <span id="toggleText">Don't have an account?</span> 
        <a onclick="toggleAuthMode()">Register here</a>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  let isLogin = true;
  
  function toggleAuthMode() {
    isLogin = !isLogin;
    const nameGroup = document.getElementById('nameGroup');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleText = document.getElementById('toggleText');
    const toggleLink = document.querySelector('.toggle-text a');
    const actionField = document.getElementById('actionField');
    
    if (isLogin) {
      nameGroup.style.display = 'none';
      authTitle.innerText = 'Welcome Back';
      authSubtitle.innerText = 'Login to access your patient portal';
      submitBtn.innerText = 'Login';
      toggleText.innerText = "Don't have an account?";
      toggleLink.innerText = 'Register here';
      document.getElementById('name').removeAttribute('required');
      actionField.value = 'login';
    } else {
      nameGroup.style.display = 'block';
      authTitle.innerText = 'Create Account';
      authSubtitle.innerText = 'Join Soft Care to manage your health';
      submitBtn.innerText = 'Register';
      toggleText.innerText = 'Already have an account?';
      toggleLink.innerText = 'Login here';
      document.getElementById('name').setAttribute('required', 'true');
      actionField.value = 'register';
    }
  }
</script>
</body>
</html>
