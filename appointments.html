<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointments - Soft Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: var(--primary);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }

        /* SEARCH */
        .search-area {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
        }

        .search-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-area input:focus { border-color: var(--primary); }

        /* DOCTOR LIST */
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .doctor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .doctor-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: var(--primary-light);
        }

        .doctor-info h3 { margin: 0 0 4px; font-size: 1.1rem; }
        .doctor-info .hospital { color: var(--text-light); font-size: 0.85rem; margin-bottom: 8px; font-weight: 500; }
        .doctor-info .specialty {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .slots-info { font-size: 0.8rem; color: var(--text-light); margin-bottom: 15px; }

        .btn-book {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-book:hover { opacity: 0.9; }

        /* APPOINTMENTS */
        .appointments-list {
            display: grid;
            gap: 15px;
        }

        .appt-item {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .appt-details h4 { margin: 0 0 4px; font-size: 1rem; }
        .appt-details p { margin: 0; font-size: 0.85rem; color: var(--text-light); }

        .btn-cancel {
            padding: 8px 16px;
            background: #fff1f2;
            color: var(--danger);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background: #fee2e2; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--card);
            width: 90%;
            max-width: 450px;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .modal h2 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        .modal p { color: var(--text-light); margin-bottom: 25px; }

        .form-field { text-align: left; margin-bottom: 20px; }
        .form-field label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-light); }
        .form-field select, .form-field input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .modal-actions { display: flex; gap: 12px; margin-top: 30px; }
        .btn-confirm { flex: 2; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-close { flex: 1; padding: 14px; background: #f1f5f9; color: var(--text-light); border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        .empty-state { text-align: center; color: var(--text-light); padding: 40px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .doctor-card { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Book Appointment</h1>
            <p style="color: var(--text-light); margin: 4px 0 0;">Find the best doctors in your city</p>
        </div>
        <a href="pateintportal.html" class="back-link">← Back to Dashboard</a>
    </header>

    <!-- SEARCH -->
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Search by doctor, specialty, or hospital..." oninput="filterDoctors()">
    </div>

    <!-- DOCTOR LIST -->
    <div class="section-title">👨‍⚕️ Available Doctors</div>
    <div id="doctorGrid" class="doctor-grid">
        <!-- JS inserts doctors here -->
    </div>

    <!-- BOOKINGS -->
    <div class="section-title">📅 My Appointments</div>
    <div id="appointmentsList" class="appointments-list">
        <!-- JS inserts appointments here -->
    </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">Book Slot</h2>
        <p id="modalSubtitle"></p>
        
        <div class="form-field">
            <label>Select Date</label>
            <input type="date" id="bookDate">
        </div>

        <div class="form-field">
            <label>Select Time Slot</label>
            <select id="bookTime">
                <!-- Slots populated by JS -->
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-confirm" onclick="confirmBooking()">Confirm Booking</button>
            <button class="btn-close" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // 🏥 REALISTIC DOCTORS DATASET
    const hospitals = ["City General Hospital", "Grace Medical Center", "Unity Health Clinic", "St. Mary's Hospital", "Lotus Wellness"];
    const specialties = ["Cardiologist", "Dermatologist", "Neurologist", "Orthopedic", "Pediatrician", "General Physician"];
    const drNames = ["Amit Sharma", "Neha Gupta", "Rahul Varma", "Priya Singh", "Arjun Reddy", "Sanya Iyer", "Vikram Malhotra", "Anjali Mehta"];

    let doctors = [];
    for (let i = 1; i <= 30; i++) {
        doctors.push({
            id: i,
            name: "Dr. " + drNames[i % drNames.length] + " " + i,
            hospital: hospitals[i % hospitals.length],
            specialization: specialties[i % specialties.length],
            slots: ["10:00 AM", "11:30 AM", "02:00 PM", "04:30 PM", "06:00 PM"],
            experience: Math.floor(Math.random() * 15) + 3
        });
    }

    let selectedDoctor = null;

    // RENDER DOCTORS
    function renderDoctors(list) {
        const grid = document.getElementById('doctorGrid');
        grid.innerHTML = "";

        if (list.length === 0) {
            grid.innerHTML = '<div class="empty-state">No doctors found matching your search.</div>';
            return;
        }

        list.forEach((doc, index) => {
            const card = document.createElement('div');
            card.className = 'doctor-card';
            card.style.animationDelay = (index * 0.05) + 's';
            card.innerHTML = `
                <div class="doctor-info">
                    <span class="specialty">${doc.specialization}</span>
                    <h3>${doc.name}</h3>
                    <div class="hospital">🏥 ${doc.hospital}</div>
                    <p style="font-size: 0.8rem; margin: 0 0 10px;">${doc.experience} years experience</p>
                    <div class="slots-info">🕒 Next Available: Today, ${doc.slots[0]}</div>
                </div>
                <button class="btn-book" onclick="openModal(${doc.id})">Book Appointment</button>
            `;
            grid.appendChild(card);
        });
    }

    // FILTER
    function filterDoctors() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = doctors.filter(d => 
            d.name.toLowerCase().includes(val) || 
            d.specialization.toLowerCase().includes(val) || 
            d.hospital.toLowerCase().includes(val)
        );
        renderDoctors(filtered);
    }

    // MODAL
    function openModal(id) {
        selectedDoctor = doctors.find(d => d.id === id);
        document.getElementById('modalTitle').innerText = selectedDoctor.name;
        document.getElementById('modalSubtitle').innerText = `${selectedDoctor.specialization} at ${selectedDoctor.hospital}`;
        
        // Default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('bookDate').value = tomorrow.toISOString().split('T')[0];
        document.getElementById('bookDate').min = new Date().toISOString().split('T')[0];

        // Populate slots
        const timeSelect = document.getElementById('bookTime');
        timeSelect.innerHTML = "";
        selectedDoctor.slots.forEach(slot => {
            const opt = document.createElement('option');
            opt.value = slot;
            opt.innerText = slot;
            timeSelect.appendChild(opt);
        });

        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        selectedDoctor = null;
    }

    // BOOKING
    function confirmBooking() {
        const date = document.getElementById('bookDate').value;
        const time = document.getElementById('bookTime').value;

        if (!date || !time) {
            alert("Please select both date and time");
            return;
        }

        const appt = {
            id: Date.now(),
            doctor: selectedDoctor.name,
            hospital: selectedDoctor.hospital,
            specialty: selectedDoctor.specialization,
            date: date,
            time: time,
            createdAt: new Date().toISOString()
        };

        const appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
        appointments.push(appt);
        localStorage.setItem('appointments', JSON.stringify(appointments));

        closeModal();
        loadAppointments();
        
        // Dynamic Notification
        const btn = event.target;
        btn.innerText = "Confirmed ✅";
        setTimeout(() => {
            alert(`Appointment Booked Successfully with ${selectedDoctor.name}!`);
        }, 100);
    }

    // LOAD APPOINTMENTS
    function loadAppointments() {
        const list = document.getElementById('appointmentsList');
        const appts = JSON.parse(localStorage.getItem('appointments') || '[]');
        
        list.innerHTML = "";
        if (appts.length === 0) {
            list.innerHTML = '<div class="empty-state">No appointments booked yet.</div>';
            return;
        }

        // Sort by date (latest first)
        appts.sort((a, b) => new Date(b.date) - new Date(a.date));

        appts.forEach(a => {
            const div = document.createElement('div');
            div.className = 'appt-item';
            div.innerHTML = `
                <div class="appt-details">
                    <h4>${a.doctor}</h4>
                    <p>📅 ${a.date} at ${a.time}</p>
                    <p style="font-size: 0.75rem;">📍 ${a.hospital} (${a.specialty})</p>
                </div>
                <button class="btn-cancel" onclick="cancelAppointment(${a.id})">Cancel</button>
            `;
            list.appendChild(div);
        });
    }

    function cancelAppointment(id) {
        if (!confirm("Are you sure you want to cancel this appointment?")) return;
        
        let appts = JSON.parse(localStorage.getItem('appointments') || '[]');
        appts = appts.filter(a => a.id !== id);
        localStorage.setItem('appointments', JSON.stringify(appts));
        loadAppointments();
    }

    // INIT
    renderDoctors(doctors);
    loadAppointments();
</script>

</body>
</html>
